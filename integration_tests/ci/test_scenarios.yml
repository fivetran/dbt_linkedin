schema_variable_name: "linkedin_ads_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "toggle vars"
    vars:
      linkedin_ads__use_local_currency: true
      ad_reporting__url_report__using_null_filter: false
      linkedin_ads__using_geo: false
      linkedin_ads__using_monthly_ad_analytics_by_member_country: false
      linkedin_ads__using_monthly_ad_analytics_by_member_region: false
    include_incremental: false

  - name: "MDLS"
    vars:
      fivetran_using_source_casing: true
    include_incremental: false
    include_dbt_seed: true
